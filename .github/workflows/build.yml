name: Build Debt Holder APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # This allows you to manually trigger a build from GitHub's website

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Caching preserves the heavy Android SDK/NDK downloads between builds so your future runs are much faster
    - name: Cache Buildozer global directory
      uses: actions/cache@v4
      with:
        path: .buildozer_global
        key: buildozer-global-${{ hashFiles('buildozer.spec') }}

    - name: Build APK with Buildozer
      uses: ArtemSBulgakov/buildozer-action@v1
      id: buildozer
      with:
        command: buildozer android debug
        buildozer_version: master

    # This extracts the finished package and presents it as a downloadable link on your GitHub Actions tab
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: debt-holder-apk
        path: ${{ steps.buildozer.outputs.filename }}
