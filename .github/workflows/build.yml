name: Build Debt Holder APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lld

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.33

    - name: Cache Buildozer global directory
      uses: actions/cache@v4
      with:
        path: .buildozer_global
        key: buildozer-global-${{ hashFiles('buildozer.spec') }}

    - name: Pre-accept Android SDK Licenses
      run: |
        # Set up standard Android command-line tools directory paths ahead of time
        mkdir -p ~/.buildozer/android/platform/
        
        # Download standalone Android cmdline-tools so we can accept licenses before the build starts
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        mkdir -p ./cmdline-tools
        unzip -q cmdline-tools.zip -d ./cmdline-tools
        
        # Accept all licensing loops natively via the terminal
        mkdir -p ~/.android && touch ~/.android/repositories.cfg
        yes | ./cmdline-tools/cmdline-tools/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk --licenses || true

    - name: Build APK with Buildozer
      run: |
        buildozer android debug
      env:
        BUILDOZER_ALLOW_KIVY_NEW_DESIGN: 1

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: debt-holder-apk
        path: .bin/*.apk
